<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphsmith Plan Inspector</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; display: flex; height: 100vh; }

  /* Sidebar */
  #sidebar { width: 320px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; overflow: hidden; }
  #sidebar-header { padding: 16px; border-bottom: 1px solid #eee; }
  #sidebar-header h1 { font-size: 18px; margin-bottom: 8px; }
  #sidebar-header p { font-size: 12px; color: #666; }
  #load-section { padding: 12px 16px; border-bottom: 1px solid #eee; }
  #load-section button, #load-section label { display: inline-block; padding: 6px 12px; background: #0066cc; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; margin-right: 6px; }
  #load-section button:hover, #load-section label:hover { background: #0055aa; }
  #load-section input[type=file] { display: none; }
  #detail-panel { flex: 1; overflow-y: auto; padding: 16px; font-size: 13px; }
  #detail-panel h3 { margin-bottom: 8px; font-size: 14px; color: #333; }
  .detail-section { margin-bottom: 16px; }
  .detail-section h4 { font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 4px; }
  .detail-kv { display: flex; margin-bottom: 2px; }
  .detail-kv .k { color: #666; min-width: 80px; }
  .detail-kv .v { color: #1a1a1a; word-break: break-all; }
  .tag { display: inline-block; background: #e8f4f8; color: #0066cc; padding: 2px 6px; border-radius: 3px; font-size: 11px; margin: 1px; }
  #mermaid-output { display: none; padding: 16px; }
  #mermaid-output pre { background: #f0f0f0; padding: 12px; border-radius: 4px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; }

  /* Canvas */
  #canvas { flex: 1; position: relative; overflow: hidden; }
  #canvas svg { width: 100%; height: 100%; }
  .node-group { cursor: pointer; }
  .node-rect { rx: 6; ry: 6; stroke-width: 2; }
  .node-rect.input-node { fill: #e8f4f8; stroke: #0066cc; }
  .node-rect.output-node { fill: #e8f8e8; stroke: #28a745; }
  .node-rect.skill-node { fill: #fff; stroke: #666; }
  .node-rect.skill-node.selected { stroke: #0066cc; stroke-width: 3; }
  .node-label { font-size: 12px; fill: #1a1a1a; text-anchor: middle; font-weight: 600; }
  .node-sublabel { font-size: 10px; fill: #666; text-anchor: middle; }
  .edge-line { stroke: #999; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  .edge-label { font-size: 10px; fill: #666; }

  /* Drop zone */
  #drop-zone { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,102,204,0.05); border: 3px dashed #0066cc; border-radius: 12px; margin: 40px; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  #drop-zone.active { opacity: 1; }
  #drop-zone p { font-size: 18px; color: #0066cc; }
  #empty-state { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #999; font-size: 16px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>Graphsmith Inspector</h1>
    <p>Load a saved plan to inspect its graph</p>
  </div>
  <div id="load-section">
    <label for="file-input">Open Plan JSON</label>
    <input type="file" id="file-input" accept=".json">
    <button id="export-mermaid-btn" style="display:none;">Export Mermaid</button>
  </div>
  <div id="detail-panel">
    <div id="plan-info" style="display:none;"></div>
    <div id="node-detail" style="display:none;"></div>
  </div>
  <div id="mermaid-output">
    <h4>Mermaid Export</h4>
    <pre id="mermaid-code"></pre>
    <button onclick="copyMermaid()" style="margin-top:8px;padding:4px 8px;font-size:12px;cursor:pointer;">Copy</button>
  </div>
</div>

<div id="canvas">
  <div id="empty-state">Drop a plan JSON file here or click "Open Plan JSON"</div>
  <div id="drop-zone"><p>Drop plan JSON here</p></div>
  <svg id="graph-svg">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
      </marker>
    </defs>
  </svg>
</div>

<script>
const fileInput = document.getElementById('file-input');
const canvas = document.getElementById('canvas');
const svg = document.getElementById('graph-svg');
const emptyState = document.getElementById('empty-state');
const dropZone = document.getElementById('drop-zone');
const planInfo = document.getElementById('plan-info');
const nodeDetail = document.getElementById('node-detail');
const exportBtn = document.getElementById('export-mermaid-btn');
const mermaidOutput = document.getElementById('mermaid-output');
const mermaidCode = document.getElementById('mermaid-code');

let currentPlan = null;
let selectedNodeId = null;

// File loading
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });

canvas.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('active'); });
canvas.addEventListener('dragleave', () => dropZone.classList.remove('active'));
canvas.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('active');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const plan = JSON.parse(e.target.result);
      if (!plan.graph || !plan.graph.nodes) throw new Error('Not a valid GlueGraph');
      currentPlan = plan;
      renderGraph(plan);
      showPlanInfo(plan);
      emptyState.style.display = 'none';
      exportBtn.style.display = 'inline-block';
      mermaidOutput.style.display = 'none';
    } catch (err) {
      alert('Failed to load plan: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function showPlanInfo(plan) {
  const inputs = (plan.inputs || []).map(i => i.name).join(', ');
  const outputs = (plan.outputs || []).map(o => o.name).join(', ');
  const effects = (plan.effects || []).join(', ') || 'pure';
  planInfo.style.display = 'block';
  nodeDetail.style.display = 'none';
  planInfo.innerHTML = `
    <div class="detail-section">
      <h3>${plan.goal || 'Plan'}</h3>
    </div>
    <div class="detail-section">
      <h4>Inputs</h4>
      ${(plan.inputs||[]).map(i => `<div class="detail-kv"><span class="k">${i.name}</span><span class="v">${i.type}</span></div>`).join('')}
    </div>
    <div class="detail-section">
      <h4>Outputs</h4>
      ${(plan.outputs||[]).map(o => `<div class="detail-kv"><span class="k">${o.name}</span><span class="v">${o.type}</span></div>`).join('')}
    </div>
    <div class="detail-section">
      <h4>Effects</h4>
      <div>${(plan.effects||['pure']).map(e => `<span class="tag">${e}</span>`).join(' ')}</div>
    </div>
    <div class="detail-section">
      <h4>Graph Outputs</h4>
      ${Object.entries(plan.graph.outputs||{}).map(([k,v]) => `<div class="detail-kv"><span class="k">${k}</span><span class="v">← ${v}</span></div>`).join('')}
    </div>
    <div class="detail-section" style="color:#999;font-size:11px;">Click a node for details</div>
  `;
}

function showNodeDetail(node) {
  selectedNodeId = node.id;
  nodeDetail.style.display = 'block';
  const skillId = (node.config||{}).skill_id || '';
  const version = (node.config||{}).version || '';
  nodeDetail.innerHTML = `
    <div class="detail-section">
      <h3>Node: ${node.id}</h3>
    </div>
    <div class="detail-section">
      <h4>Operation</h4>
      <div class="detail-kv"><span class="k">op</span><span class="v">${node.op}</span></div>
      ${skillId ? `<div class="detail-kv"><span class="k">skill</span><span class="v">${skillId}@${version}</span></div>` : ''}
    </div>
    ${Object.keys(node.config||{}).length ? `
    <div class="detail-section">
      <h4>Config</h4>
      ${Object.entries(node.config||{}).map(([k,v]) => `<div class="detail-kv"><span class="k">${k}</span><span class="v">${JSON.stringify(v)}</span></div>`).join('')}
    </div>` : ''}
    ${Object.keys(node.inputs||{}).length ? `
    <div class="detail-section">
      <h4>Node Inputs</h4>
      ${Object.entries(node.inputs||{}).map(([k,v]) => `<div class="detail-kv"><span class="k">${k}</span><span class="v">← ${v}</span></div>`).join('')}
    </div>` : ''}
  `;
  highlightNode(node.id);
}

// Graph rendering
function renderGraph(plan) {
  const nodes = plan.graph.nodes || [];
  const edges = plan.graph.edges || [];
  const graphOutputs = plan.graph.outputs || {};

  // Layout: topological levels
  const adj = {};
  const indeg = {};
  nodes.forEach(n => { adj[n.id] = []; indeg[n.id] = 0; });
  edges.forEach(e => {
    const src = e.from_ ? e.from_.split('.')[0] : (e.from || '').split('.')[0];
    const dst = (e.to || '').split('.')[0];
    if (src !== 'input' && adj[src] !== undefined && indeg[dst] !== undefined) {
      adj[src].push(dst);
      indeg[dst]++;
    }
  });

  // Topo sort into levels
  const levels = [];
  let queue = Object.keys(indeg).filter(k => indeg[k] === 0).sort();
  while (queue.length) {
    levels.push([...queue]);
    const next = [];
    queue.forEach(n => {
      (adj[n]||[]).forEach(m => {
        indeg[m]--;
        if (indeg[m] === 0) next.push(m);
      });
    });
    queue = next.sort();
  }

  // Position calculation
  const nodeW = 160, nodeH = 50, levelGap = 100, nodeGap = 30;
  const totalLevels = levels.length + 2; // +input, +output
  const svgW = canvas.clientWidth;
  const svgH = canvas.clientHeight;
  const startY = 60;

  const positions = {};

  // Input node
  const inputId = '__input__';
  positions[inputId] = { x: svgW/2, y: startY, w: nodeW, h: 40 };

  // Skill nodes by level
  levels.forEach((level, li) => {
    const y = startY + (li + 1) * (nodeH + levelGap);
    const totalW = level.length * nodeW + (level.length - 1) * nodeGap;
    const startX = (svgW - totalW) / 2 + nodeW/2;
    level.forEach((nid, ni) => {
      positions[nid] = { x: startX + ni * (nodeW + nodeGap), y, w: nodeW, h: nodeH };
    });
  });

  // Output node
  const outputId = '__output__';
  const outputY = startY + (levels.length + 1) * (nodeH + levelGap);
  positions[outputId] = { x: svgW/2, y: outputY, w: nodeW, h: 40 };

  // Clear and render
  svg.innerHTML = `<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#999"/></marker></defs>`;

  // Edges
  edges.forEach(e => {
    const fromAddr = e.from_ || e.from || '';
    const toAddr = e.to || '';
    const srcScope = fromAddr.split('.')[0];
    const srcPort = fromAddr.split('.').slice(1).join('.');
    const dstScope = toAddr.split('.')[0];

    const srcId = srcScope === 'input' ? inputId : srcScope;
    const dstId = dstScope;
    if (!positions[srcId] || !positions[dstId]) return;

    const x1 = positions[srcId].x, y1 = positions[srcId].y + positions[srcId].h/2;
    const x2 = positions[dstId].x, y2 = positions[dstId].y - positions[dstId].h/2;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const midY = (y1 + y2) / 2;
    path.setAttribute('d', `M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}`);
    path.setAttribute('class', 'edge-line');
    svg.appendChild(path);

    // Edge label
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', (x1+x2)/2 + 8);
    label.setAttribute('y', midY - 4);
    label.setAttribute('class', 'edge-label');
    label.textContent = srcPort;
    svg.appendChild(label);
  });

  // Output edges
  Object.entries(graphOutputs).forEach(([name, addr]) => {
    const scope = addr.split('.')[0];
    if (!positions[scope]) return;
    const x1 = positions[scope].x, y1 = positions[scope].y + positions[scope].h/2;
    const x2 = positions[outputId].x, y2 = positions[outputId].y - positions[outputId].h/2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    const midY = (y1 + y2) / 2;
    path.setAttribute('d', `M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}`);
    path.setAttribute('class', 'edge-line');
    svg.appendChild(path);
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', (x1+x2)/2 + 8);
    label.setAttribute('y', midY - 4);
    label.setAttribute('class', 'edge-label');
    label.textContent = name;
    svg.appendChild(label);
  });

  // Input node
  drawNode(inputId, 'Inputs', (plan.inputs||[]).map(i=>i.name).join(', '), 'input-node', positions[inputId]);

  // Skill nodes
  nodes.forEach(n => {
    const skill = (n.config||{}).skill_id || n.op;
    drawNode(n.id, n.id, skill, 'skill-node', positions[n.id], () => showNodeDetail(n));
  });

  // Output node
  drawNode(outputId, 'Outputs', (plan.outputs||[]).map(o=>o.name).join(', '), 'output-node', positions[outputId]);
}

function drawNode(id, label, sublabel, cls, pos, onClick) {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('class', 'node-group');
  g.setAttribute('data-id', id);

  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', pos.x - pos.w/2);
  rect.setAttribute('y', pos.y - pos.h/2);
  rect.setAttribute('width', pos.w);
  rect.setAttribute('height', pos.h);
  rect.setAttribute('class', `node-rect ${cls}`);
  g.appendChild(rect);

  const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', pos.x);
  text.setAttribute('y', pos.y - 4);
  text.setAttribute('class', 'node-label');
  text.textContent = label;
  g.appendChild(text);

  const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  sub.setAttribute('x', pos.x);
  sub.setAttribute('y', pos.y + 12);
  sub.setAttribute('class', 'node-sublabel');
  sub.textContent = sublabel.length > 22 ? sublabel.slice(0,20)+'…' : sublabel;
  g.appendChild(sub);

  if (onClick) g.addEventListener('click', onClick);
  svg.appendChild(g);
}

function highlightNode(id) {
  svg.querySelectorAll('.node-rect.selected').forEach(r => r.classList.remove('selected'));
  const g = svg.querySelector(`[data-id="${id}"]`);
  if (g) g.querySelector('.node-rect').classList.add('selected');
}

// Mermaid export
exportBtn.addEventListener('click', () => {
  if (!currentPlan) return;
  const lines = ['```mermaid', 'flowchart TD'];
  const inputs = (currentPlan.inputs||[]).map(i=>i.name).join(', ');
  const outputs = (currentPlan.outputs||[]).map(o=>o.name).join(', ');
  lines.push(`    Inputs["Inputs<br/>${inputs}"]`);
  (currentPlan.graph.nodes||[]).forEach(n => {
    const skill = (n.config||{}).skill_id || n.op;
    lines.push(`    ${n.id}["${n.id}<br/>${skill}"]`);
  });
  lines.push(`    Outputs["Outputs<br/>${outputs}"]`);
  lines.push('');
  (currentPlan.graph.edges||[]).forEach(e => {
    const from = e.from_ || e.from || '';
    const src = from.split('.')[0];
    const port = from.split('.').slice(1).join('.');
    const dst = (e.to||'').split('.')[0];
    lines.push(`    ${src === 'input' ? 'Inputs' : src} -->|${port}| ${dst}`);
  });
  Object.entries(currentPlan.graph.outputs||{}).forEach(([name, addr]) => {
    const scope = addr.split('.')[0];
    lines.push(`    ${scope} -->|${name}| Outputs`);
  });
  lines.push('```');
  mermaidCode.textContent = lines.join('\n');
  mermaidOutput.style.display = 'block';
});

function copyMermaid() {
  navigator.clipboard.writeText(mermaidCode.textContent);
}

// Handle canvas click to deselect
svg.addEventListener('click', e => {
  if (!e.target.closest('.node-group')) {
    selectedNodeId = null;
    svg.querySelectorAll('.node-rect.selected').forEach(r => r.classList.remove('selected'));
    if (currentPlan) showPlanInfo(currentPlan);
  }
});
</script>
</body>
</html>
