version: 1

nodes:
  - id: prompt
    op: template.render
    config:
      template: "Extract the main keywords from the following text as a comma-separated list:\n{{text}}"

  - id: extract
    op: llm.generate
    inputs:
      prompt: prompt.rendered

edges:
  - from: input.text
    to: prompt.text

outputs:
  keywords: extract.text
