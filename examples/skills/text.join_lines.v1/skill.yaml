id: text.join_lines.v1
name: Join Lines
version: 1.0.0
description: Post-process and format text output from other skills with a "Keywords:" header. Use as a terminal formatting step after extraction or summarization.

inputs:
  - name: lines
    type: string
    required: true
    description: Text to format (typically output from another skill).

outputs:
  - name: joined
    type: string

effects:
  - pure

tags:
  - text
  - join
  - formatting
